<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>검사항목 관리 · 정도관리</title>
  <link rel="stylesheet" href="../../assets/css/common.css" />
  <link rel="stylesheet" href="../../assets/css/pages/qc-items.css" />
  <link rel="stylesheet" href="../../assets/font/tabler-icons/tabler-icons.min.css" />
  <script>
    if (new URLSearchParams(location.search).get('shell') === '1')
      document.documentElement.classList.add('in-shell');
  </script>
</head>
<body class="qc-items-page">

<div class="lj-page">

  <!-- 액션바 -->
  <div class="lj-actionbar">
    <div class="lj-actionbar-left">
      <div id="deptFilterRow" style="display:none; align-items:center; gap:8px;">
        <select id="clinicFilterSelect" class="input lj-filter-select"></select>
        <select id="teamFilterSelect"   class="input lj-filter-select" disabled></select>
      </div>
    </div>
    <div class="lj-actionbar-right">
      <button type="button" class="btn btn-sm btn-primary" id="addItemTabBtn">
        <i class="ti ti-plus"></i> 항목 추가
      </button>
    </div>
  </div>

  <div id="messageBox" class="message-box" style="display:none;"></div>

  <div id="permissionDenied" class="lj-card" style="display:none;">
    <div class="lj-empty">
      <i class="ti ti-lock" style="font-size:40px;color:#d1d5db;"></i>
      <p class="lj-empty-title">접근 권한이 없습니다</p>
      <p class="lj-empty-desc">관리자에게 권한을 요청하세요.</p>
    </div>
  </div>

  <!-- 2단 본문 -->
  <div class="qc-items-body">

    <!-- 좌: 그룹 관리 -->
    <div class="lj-card qc-groups-panel">
      <div class="lj-card-head">
        <span class="lj-card-title"><i class="ti ti-folder"></i> 그룹 관리</span>
      </div>
      <!-- 그룹 추가 폼 -->
      <div class="qc-group-form">
        <input type="hidden" id="groupModalGroupId" />
        <div class="qc-group-form-row">
          <input type="text" id="groupModalGroupName" class="input" placeholder="그룹명 입력"
            onkeydown="if(event.key==='Enter')saveGroup()" />
          <input type="text" id="groupModalMemo" class="input" placeholder="메모 (선택)"
            onkeydown="if(event.key==='Enter')saveGroup()" />
        </div>
        <div class="qc-group-form-actions">
          <button class="btn btn-sm btn-primary" id="groupSaveBtn" onclick="saveGroup()">
            <i class="ti ti-plus"></i> <span id="groupSaveBtnText">그룹 추가</span>
          </button>
          <button class="btn btn-sm" id="groupCancelEditBtn" onclick="resetGroupForm()" style="display:none;">
            취소
          </button>
        </div>
      </div>
      <!-- 그룹 목록 -->
      <div class="qc-group-list" id="groupManageList">
        <div class="lj-empty" style="padding:20px;">
          <i class="ti ti-folder-off" style="font-size:28px;color:#d1d5db;"></i>
          <p class="lj-empty-desc">등록된 그룹이 없습니다</p>
        </div>
      </div>
    </div>

    <!-- 우: 검사항목 목록 -->
    <div class="lj-card qc-items-panel">
      <div class="lj-card-head">
        <span class="lj-card-title"><i class="ti ti-flask"></i> 검사항목 목록</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <select id="groupFilterSelect" class="input lj-filter-select"
            style="height:28px;font-size:11px;" onchange="onGroupFilterChange(this.value)">
            <option value="">전체 그룹</option>
          </select>
          <span class="lj-card-count" id="itemCountText"></span>
        </div>
      </div>
      <!-- 항목 테이블 -->
      <div class="qc-item-table-wrap">
        <div class="lj-empty" id="itemEmptyState">
          <i class="ti ti-flask-off" style="font-size:36px;color:#d1d5db;"></i>
          <p class="lj-empty-title" id="itemEmptyTitle">등록된 검사항목이 없습니다</p>
          <p class="lj-empty-desc" id="itemEmptyDesc"><strong>+ 항목 추가</strong> 버튼을 눌러 첫 번째 검사 항목을 추가하세요.</p>
        </div>
        <table class="qc-item-table" id="itemTable" style="display:none;">
          <thead>
            <tr>
              <th>항목명</th>
              <th>그룹</th>
              <th>유형</th>
              <th>단위/프리셋</th>
              <th style="text-align:right;">Mean / SD</th>
              <th style="width:80px;"></th>
            </tr>
          </thead>
          <tbody id="itemTableBody"></tbody>
        </table>
      </div>
    </div>

  </div><!-- /qc-items-body -->

</div><!-- /lj-page -->

<!-- 검사 항목 추가/수정 모달 -->
<div class="lj-modal-overlay" id="itemModal" style="display:none;">
  <div class="lj-modal">
    <div class="lj-modal-head">
      <span class="lj-modal-title" id="itemModalTitle">
        <i class="ti ti-flask"></i> 검사 항목 추가
      </span>
      <button class="lj-modal-close" id="itemModalClose"><i class="ti ti-x"></i></button>
    </div>
    <div class="lj-modal-body">
      <input type="hidden" id="modalItemId" />
      <div class="lj-modal-grid">
        <div class="form-field lj-full">
          <label class="form-label required">검사 항목명</label>
          <input type="text" id="modalItemName" class="input" placeholder="예: GLU, HbA1c, RPR" />
        </div>
        <div class="form-field lj-full">
          <label class="form-label">그룹 (선택)</label>
          <select id="modalItemGroup" class="input"><option value="">미분류 (그룹 없음)</option></select>
        </div>
        <div id="modalOrgFields" style="display:none; contents:none;">
          <div class="form-field">
            <label class="form-label required">의원</label>
            <select id="modalItemClinic" class="input"><option value="">선택</option></select>
          </div>
          <div class="form-field">
            <label class="form-label required">팀</label>
            <select id="modalItemTeam" class="input"><option value="">선택</option></select>
          </div>
        </div>
        <div class="form-field lj-full">
          <label class="form-label required">관리 유형</label>
          <select id="modalItemType" class="input">
            <option value="quantitative">정량적 (Quantitative) — 수치 측정값</option>
            <option value="qualitative">정성적 (Qualitative) — Positive/Negative 등</option>
          </select>
        </div>
        <div id="quantitativeFields" style="display:contents;">
          <div class="form-field">
            <label class="form-label required">단위</label>
            <input type="text" id="modalItemUnit" class="input" placeholder="예: mg/dL, %" />
          </div>
          <div class="form-field">
            <label class="form-label">소수점 자리수</label>
            <select id="modalItemDecimal" class="input">
              <option value="0">0자리</option>
              <option value="1">1자리</option>
              <option value="2">2자리</option>
              <option value="3" selected>3자리</option>
              <option value="4">4자리</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label required">목표 평균 (Mean)</label>
            <input type="number" id="modalItemMean" class="input" step="any" placeholder="0.00" />
          </div>
          <div class="form-field">
            <label class="form-label required">표준편차 (SD)</label>
            <input type="number" id="modalItemSd" class="input" step="any" placeholder="0.00" min="0.0001" />
          </div>
        </div>
        <div id="qualitativeFields" style="display:none; contents:none;">
          <div class="form-field lj-full">
            <label class="form-label required">결과값 프리셋</label>
            <select id="modalItemPreset" class="input">
              <option value="pos_neg">Positive / Negative</option>
              <option value="reactive">Reactive / Non-Reactive</option>
              <option value="detected">Detected / Not Detected</option>
              <option value="neg_plus">Negative / Trace / 1+ / 2+ / 3+ / 4+</option>
              <option value="weak_reactive">Non-Reactive / Weakly Reactive / Reactive</option>
              <option value="weak_pos">Negative / Weak Positive / Positive / Strong Positive</option>
            </select>
          </div>
          <div class="form-field lj-full">
            <label class="form-label required">기대 결과값 (정상)</label>
            <select id="modalItemExpected" class="input"></select>
          </div>
        </div>
        <div class="form-field lj-full">
          <label class="form-label">메모 (선택)</label>
          <input type="text" id="modalItemMemo" class="input" placeholder="장비명, 시약 lot 등 참고 정보" />
        </div>
      </div>
    </div>
    <div class="lj-modal-foot">
      <button type="button" class="btn btn-sm" id="itemModalCancel">취소</button>
      <button type="button" class="btn btn-sm btn-primary" id="itemModalSave">저장</button>
    </div>
  </div>
</div>

<div id="globalLoading" aria-hidden="true">
  <div class="global-loading__dialog">
    <div class="global-loading__spinner"></div>
    <div id="globalLoadingText" class="global-loading__text">불러오는 중...</div>
  </div>
</div>

<!-- 숨김 요소 (기존 JS 호환) -->
<div style="display:none;">
  <div id="skeletonBody"></div>
  <div id="appBody"></div>
  <select id="itemSelect"></select>
  <div id="settingsSection"></div>
  <div id="settingsDisplay"></div>
  <div id="groupItemListWrap"></div>
  <div id="groupItemCount"></div>
  <div id="assignPanelEmpty"></div>
  <div id="assignPanel"></div>
  <div id="assignPanelTitle"></div>
  <div id="assignedCount"></div>
  <div id="unassignedCount"></div>
  <div id="assignedItems"></div>
  <div id="unassignedItems"></div>
  <div id="groupModalSpinner"></div>
  <span id="groupModalSpinnerText"></span>
</div>

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/utils.js"></script>
<script src="../../assets/js/core/auth.js"></script>
<script src="../../assets/js/core/app-permission.js"></script>
<script src="../../assets/js/qc/common.js"></script>
<script src="../../assets/js/qc/items.js"></script>
<script>
// 항목 테이블 렌더링 — items.js의 renderItemSelect 대신
function renderItemTable() {
  const tbody = document.getElementById('itemTableBody');
  const table = document.getElementById('itemTable');
  const empty = document.getElementById('itemEmptyState');
  const countEl = document.getElementById('itemCountText');

  const filterGroupId = document.getElementById('groupFilterSelect')?.value || '';
  const list = filterGroupId
    ? state.items.filter(i => i.group_id === filterGroupId)
    : state.items;

  if (countEl) countEl.textContent = list.length + '건';

  if (!list.length) {
    if (table) table.style.display = 'none';
    if (empty) empty.style.display = '';
    return;
  }
  if (table) table.style.display = '';
  if (empty) empty.style.display = 'none';

  const groupMap = {};
  (state.groups || []).forEach(g => { groupMap[g.group_id] = g.group_name; });

  tbody.innerHTML = list.map(item => {
    const groupName = item.group_id ? (groupMap[item.group_id] || '미분류') : '미분류';
    const typeLabel = item.item_type === 'qualitative' ? '정성' : '정량';
    const unitOrPreset = item.item_type === 'qualitative'
      ? (QUALITATIVE_PRESETS[item.preset]?.label?.split('/')[0]?.trim() || item.preset || '-')
      : (item.unit || '-');
    const meanSd = item.item_type === 'quantitative'
      ? (item.mean != null ? item.mean + ' / ' + item.sd : '-')
      : '-';

    return `<tr class="qc-item-row">
      <td class="qc-item-td qc-item-name">${escHtml(item.item_name)}</td>
      <td class="qc-item-td"><span class="qc-group-badge">${escHtml(groupName)}</span></td>
      <td class="qc-item-td"><span class="qc-type-badge qc-type-${item.item_type}">${typeLabel}</span></td>
      <td class="qc-item-td qc-item-sub">${escHtml(unitOrPreset)}</td>
      <td class="qc-item-td qc-item-sub" style="text-align:right;">${escHtml(meanSd)}</td>
      <td class="qc-item-td qc-item-actions">
        ${state.canEdit ? `
          <button class="btn btn-sm" onclick="openItemModal(state.items.find(i=>i.item_id==='${escHtml(item.item_id)}'))">
            <i class="ti ti-pencil"></i>
          </button>
          <button class="btn btn-sm btn-danger" onclick="deleteItemById('${escHtml(item.item_id)}','${escHtml(item.item_name)}')">
            <i class="ti ti-trash"></i>
          </button>` : ''}
      </td>
    </tr>`;
  }).join('');
}

// 그룹 목록 테이블 렌더링
function renderGroupTable() {
  const wrap = document.getElementById('groupManageList');
  if (!wrap) return;
  const list = state.groups || [];
  if (!list.length) {
    wrap.innerHTML = '<div class="lj-empty" style="padding:20px;"><i class="ti ti-folder-off" style="font-size:28px;color:#d1d5db;"></i><p class="lj-empty-desc">등록된 그룹이 없습니다</p></div>';
    return;
  }
  wrap.innerHTML = list.map(g => `
    <div class="qc-group-row">
      <div class="qc-group-row-info">
        <span class="qc-group-row-name">${escHtml(g.group_name)}</span>
        ${g.memo ? `<span class="qc-group-row-memo">${escHtml(g.memo)}</span>` : ''}
      </div>
      <div class="qc-group-row-actions">
        ${state.canEdit ? `
          <button class="btn btn-sm" onclick="editGroup('${escHtml(g.group_id)}','${escHtml(g.group_name)}','${escHtml(g.memo||'')}')">
            <i class="ti ti-pencil"></i>
          </button>
          <button class="btn btn-sm btn-danger" onclick="deleteGroup('${escHtml(g.group_id)}','${escHtml(g.group_name)}')">
            <i class="ti ti-trash"></i>
          </button>` : ''}
      </div>
    </div>
  `).join('');

  // 그룹 필터 select도 갱신
  const sel = document.getElementById('groupFilterSelect');
  if (sel) {
    const cur = sel.value;
    sel.innerHTML = '<option value="">전체 그룹</option>' +
      list.map(g => `<option value="${escHtml(g.group_id)}">${escHtml(g.group_name)}</option>`).join('');
    sel.value = cur;
  }
}

// 그룹 수정 폼 세팅
function editGroup(groupId, groupName, memo) {
  document.getElementById('groupModalGroupId').value = groupId;
  document.getElementById('groupModalGroupName').value = groupName;
  document.getElementById('groupModalMemo').value = memo || '';
  document.getElementById('groupSaveBtnText').textContent = '수정 저장';
  document.getElementById('groupCancelEditBtn').style.display = '';
  document.getElementById('groupModalGroupName').focus();
}

function resetGroupForm() {
  document.getElementById('groupModalGroupId').value = '';
  document.getElementById('groupModalGroupName').value = '';
  document.getElementById('groupModalMemo').value = '';
  document.getElementById('groupSaveBtnText').textContent = '그룹 추가';
  document.getElementById('groupCancelEditBtn').style.display = 'none';
}

// 항목 삭제 (item_id로 직접)
async function deleteItemById(itemId, itemName) {
  const item = state.items.find(i => i.item_id === itemId);
  if (!item) return;
  // 기존 selectItem 후 deleteActiveItem 호출
  state.activeItemId = itemId;
  await deleteActiveItem();
  renderItemTable();
}

// onGroupFilterChange 후 테이블 재렌더
const _origOnGroupFilterChange = typeof onGroupFilterChange === 'function' ? onGroupFilterChange : null;

// items.js 초기화 완료 후 테이블 렌더링 훅
const _origRenderItemSelect = window.renderItemSelect;
window.renderItemSelect = function() {
  if (_origRenderItemSelect) _origRenderItemSelect();
  renderItemTable();
  renderGroupTable();
};

const _origRenderGroupManageList = window.renderGroupManageList;
window.renderGroupManageList = function() {
  renderGroupTable();
};

document.getElementById('groupFilterSelect')?.addEventListener('change', function() {
  renderItemTable();
});
</script>
</body>
</html>
