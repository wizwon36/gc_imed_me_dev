<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수정요청 - MSO관리팀 업무포털</title>
  <link rel="stylesheet" href="../../assets/css/common.css" />
</head>
<body class="portal-page">
  <div class="container page-shell">

    <section class="top-brand-bar portal-topbar portal-hero-card">
      <div class="top-brand-left">
        <div class="top-brand-logo">+</div>
        <div class="top-brand-texts">
          <strong class="top-brand-title">프로그램 수정요청</strong>
          <span class="top-brand-sub">불편한 점이나 개선 사항을 알려주세요</span>
        </div>
      </div>
      <div class="top-brand-actions portal-top-actions">
        <a class="portal-header-btn portal-header-btn--secondary" href="../../portal.html">HOME</a>
        <a class="portal-header-btn portal-header-btn--secondary" href="support-list.html">내 요청 목록</a>
      </div>
    </section>

    <div id="messageBox" class="message-box"></div>

    <div class="card">
      <!-- 스켈레톤: API 응답 전 shimmer -->
      <div id="formSkeleton">
        <div class="sk-row"><div class="sk sk-label"></div><div class="sk sk-input"></div></div>
        <div class="sk-row"><div class="sk sk-label"></div><div class="sk sk-input"></div></div>
        <div class="sk-row"><div class="sk sk-label"></div><div class="sk sk-input"></div></div>
        <div class="sk-row"><div class="sk sk-label"></div>
          <div class="sk" style="height:120px;border-radius:var(--radius-sm);"></div>
        </div>
        <div style="display:flex;gap:10px;margin-top:28px;">
          <div class="sk" style="height:50px;width:120px;border-radius:16px;"></div>
          <div class="sk" style="height:50px;width:80px;border-radius:16px;"></div>
        </div>
      </div>
      <form id="supportForm" novalidate style="display:none;">

        <!-- 카테고리 선택 -->
        <div class="form-row">
          <label class="form-label" for="appId">카테고리 <span class="required">*</span></label>
          <select id="appId" class="form-control" required>
            <option value="">유형을 선택해 주세요</option>
          </select>
        </div>

        <!-- 유형 -->
        <div class="form-row">
          <label class="form-label" for="category">유형 <span class="required">*</span></label>
          <select id="category" class="form-control" required>
            <option value="">유형을 선택해 주세요</option>
          </select>
        </div>

        <!-- 제목 -->
        <div class="form-row">
          <label class="form-label" for="title">제목 <span class="required">*</span></label>
          <input type="text" id="title" class="form-control" placeholder="요청 제목을 입력해 주세요" maxlength="100" required />
        </div>

        <!-- 내용 -->
        <div class="form-row">
          <label class="form-label" for="content">내용 <span class="required">*</span></label>
          <textarea id="content" class="form-control" rows="6" placeholder="증상, 재현 방법, 개선 제안 등 상세히 작성해 주세요" required></textarea>
        </div>

        <!-- 파일 첨부 -->
        <div class="form-row">
          <label class="form-label">파일 첨부</label>
          <div class="signage-upload-flat">
            <div class="signage-file-list" id="fileList"></div>
            <div class="support-file-box">
              <div class="support-file-box-left">
                <input type="file" id="fileInput" class="photo-file-input" multiple accept="image/*,.pdf,.xlsx,.xls,.docx,.doc,.pptx,.ppt,.zip,.txt" />
                <label for="fileInput" class="photo-file-trigger">파일 선택</label>
                <div id="fileName" class="support-file-name">선택된 파일 없음</div>
              </div>
              <div class="photo-upload-limit">📎 파일당 최대 10MB · 전체 합계 20MB 이하</div>
            </div>
          </div>
        </div>

        <!-- 제출 -->
        <div class="form-actions">
          <button type="submit" id="submitBtn" class="btn btn-primary" style="min-width:120px;">요청 접수</button>
          <a href="../../portal.html" class="btn">취소</a>
        </div>

      </form>
    </div>
  </div>

  <script src="../../assets/js/core/config.js"></script>
  <script src="../../assets/js/core/api.js"></script>
  <script src="../../assets/js/core/utils.js"></script>
  <script src="../../assets/js/core/auth.js"></script>
  <script src="../../assets/js/support/support-form.js"></script>

  <div id="globalLoading" aria-hidden="true">
    <div class="global-loading__dialog">
      <div class="global-loading__spinner" aria-hidden="true"></div>
      <div class="global-loading__text" id="globalLoadingText">불러오는 중...</div>
    </div>
  </div>

  <style>
    .form-row {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .form-control {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      background: var(--surface);
      color: var(--text-primary);
      transition: border-color 0.15s;
      box-sizing: border-box;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--blue);
    }
    textarea.form-control {
      resize: vertical;
      min-height: 120px;
    }
    .form-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 28px;
      flex-wrap: wrap;
    }
    @media (max-width: 480px) {
      .form-control { font-size: 16px; } /* iOS 자동 확대 방지 */
      .form-actions .btn { flex: 1; min-width: 0; }
    }

    /* 파일 업로드 — 사인물 폼과 동일한 스타일 */
    .signage-upload-flat {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .signage-upload-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .signage-file-list { display: flex; flex-direction: column; gap: 6px; }
    .signage-file-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; border-radius: 10px;
      background: #f1f5f9; font-size: 13px; gap: 8px;
      border: 1px solid #e2e8f0;
    }
    .signage-file-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #334155; }
    .signage-file-item-status { font-weight: 700; white-space: nowrap; font-size: 12px; }
    .signage-file-item.is-uploading .signage-file-item-status { color: #2563eb; }
    .signage-file-item.is-done      .signage-file-item-status { color: #16a34a; }
    .signage-file-item.is-error     .signage-file-item-status { color: #dc2626; }
    .photo-file-control {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .photo-file-input {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); border: 0;
    }
    .photo-file-trigger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #0f172a;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .photo-file-trigger:hover { background: #f8fafc; border-color: #94a3b8; }
    .photo-file-name {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      padding: 0 14px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
      color: #475569;
      font-size: 14px;
      min-width: 160px;
      max-width: 100%;
      word-break: break-all;
    }
    /* 파일 첨부 박스 */
    .support-file-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border: 1.5px dashed #cbd5e1;
      border-radius: 12px;
      background: #f8fafc;
      width: 100%;
      box-sizing: border-box;
    }
    .support-file-box-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }
    .support-file-name {
      flex: 1;
      font-size: 14px;
      color: #64748b;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .photo-upload-limit {
      font-size: 12px;
      color: #92400e;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 5px 10px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    @media (max-width: 480px) {
      .photo-file-name { min-width: 0; flex: 1; }
    }
  </style>
</body>
</html>

<!-- 스켈레톤 공통 CSS (3개 페이지 모두 동일하게 추가) -->
<style>
  @keyframes shimmer {
    0%   { background-position: -600px 0; }
    100% { background-position:  600px 0; }
  }
  .sk {
    background: linear-gradient(90deg, #f0f2f5 25%, #e4e6ea 50%, #f0f2f5 75%);
    background-size: 600px 100%;
    animation: shimmer 1.4s infinite linear;
    border-radius: 8px;
  }
  .sk-line   { height: 14px; margin-bottom: 8px; }
  .sk-label  { height: 13px; width: 60px; margin-bottom: 8px; }
  .sk-input  { height: 44px; border-radius: var(--radius-sm); }
  .sk-block  {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
  }
  .sk-row    { margin-bottom: 20px; }
  .sk-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    margin-bottom: 10px;
  }
  .sk-badge-row { display:flex; gap:8px; margin-bottom:10px; }
  .sk-badge  { height: 22px; width: 64px; border-radius: 999px; }
  .sk-title  { height: 18px; width: 55%; border-radius: 6px; margin-bottom: 8px; }
  .sk-text   { height: 13px; width: 80%; border-radius: 6px; }
  .sk-text-sm{ height: 12px; width: 40%; border-radius: 6px; margin-top: 8px; }
</style>
