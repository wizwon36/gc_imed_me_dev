<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSO관리팀 업무지원시스템</title>
  <link rel="stylesheet" href="assets/css/common.css">
  <link rel="stylesheet" href="assets/css/pages/auth.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-badge">+</div>
        <div class="auth-brand-text">
          <strong>MSO관리팀 업무지원시스템</strong>
          <span>로그인 후 사용할 앱을 선택할 수 있습니다.</span>
        </div>
      </div>
      
      <!--
      <h1 class="auth-title">로그인</h1>
      <p class="auth-desc">등록된 아이디와 비밀번호로 로그인해 주세요.</p>
      -->
      
      <div class="auth-form">
        <div class="field-group">
          <label for="userEmail">이메일</label>
          <input type="email" id="userEmail" placeholder="이메일 주소 입력" autocomplete="username">
        </div>

        <div class="field-group">
          <label for="userPassword">비밀번호</label>
          <input type="password" id="userPassword" placeholder="비밀번호 입력" autocomplete="current-password">
        </div>

        <button type="button" class="auth-submit-btn" id="loginBtn">로그인</button>
        <div id="authMessage" class="auth-message"></div>
        <div style="text-align:center; margin-top:4px; font-size:13px; color:#667085;">
          계정이 없으신가요?
          <a href="pages/auth/register.html" style="color:#2563eb; font-weight:700; text-decoration:none;">가입 신청</a>
        </div>
        <!-- 캐시 초기화 -->
        <div style="text-align:center; margin-top:10px;">
          <button type="button" id="clearCacheBtn"
            style="background:none;border:none;font-size:12px;color:#94a3b8;cursor:pointer;padding:4px 8px;border-radius:6px;transition:color 0.15s;"
            onmouseover="this.style.color='#64748b'" onmouseout="this.style.color='#94a3b8'">
            접속 문제가 있나요? 캐시 초기화
          </button>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/js/core/config.js"></script>
  <script src="assets/js/core/utils.js"></script>
  <script src="assets/js/core/api.js"></script>
  <script src="assets/js/core/auth.js"></script>

  <div id="globalLoading" aria-hidden="true">
    <div class="global-loading__dialog">
      <div class="global-loading__spinner" aria-hidden="true"></div>
      <div class="global-loading__text" id="globalLoadingText">로딩 중...</div>
    </div>
  </div>
</body>
</html>
