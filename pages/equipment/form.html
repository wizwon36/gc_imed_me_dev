<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장비 등록</title>
  <link rel="stylesheet" href="../../assets/css/common.css" />
  <link rel="stylesheet" href="../../assets/css/pages/equipment-form.css" />
  <link rel="stylesheet" href="../../assets/font/tabler-icons/tabler-icons.min.css" />
  <script>
    if (new URLSearchParams(location.search).get('shell') === '1')
      document.documentElement.classList.add('in-shell');
  </script>
</head>
<body class="equipment-form-page">

<div class="eform-page">

  <!-- 액션바 -->
  <div class="eform-actionbar">
    <div class="eform-title-wrap">
      <span class="eform-title" id="pageTitle">장비 등록</span>
      <span class="eform-desc" id="pageDesc">신규 의료장비 정보를 등록합니다.</span>
    </div>
    <div class="eform-actionbar-right">
      <button type="button" class="btn btn-sm" id="cancelBtn">
        <i class="ti ti-arrow-left"></i> 목록으로
      </button>
      <button type="submit" form="equipmentForm" class="btn btn-sm btn-primary" id="submitButton">
        <i class="ti ti-device-floppy"></i>
        <span id="submitButtonText">장비 등록</span>
      </button>
    </div>
  </div>

  <div id="messageBox" class="message-box"></div>

  <!-- 단건 등록 폼 -->
  <form id="equipmentForm" class="eform-body eform-body--2col" autocomplete="off">

    <!-- 좌측: 장비 정보 -->
    <div class="eform-col eform-col--stretch">

      <div class="eform-section">
        <div class="eform-section-head">
          <i class="ti ti-stethoscope"></i>
          <span>장비 정보</span>
          <span class="eform-section-desc">장비 식별 및 소속 정보</span>
        </div>
        <div class="eform-grid eform-grid--2">
          <div class="form-field">
            <label class="form-label required">장비명</label>
            <input type="text" id="equipment_name" class="input" placeholder="예: 초음파 진단기" />
          </div>
          <div class="form-field">
            <label class="form-label required">모델명</label>
            <input type="text" id="model_name" class="input" placeholder="모델명을 입력하세요" />
          </div>
          <div class="form-field">
            <label class="form-label required">시리얼번호</label>
            <input type="text" id="serial_no" class="input" placeholder="시리얼번호를 입력하세요" />
          </div>
          <div class="form-field">
            <label class="form-label">상태</label>
            <select id="status" class="input"></select>
          </div>
          <div class="form-field">
            <label class="form-label required">의원</label>
            <select id="clinic_code" class="input"></select>
          </div>
          <div class="form-field">
            <label class="form-label required">팀</label>
            <select id="team_code" class="input"></select>
          </div>
          <div class="form-field" style="display:none;">
            <label class="form-label">부서명</label>
            <input type="text" id="department_preview" class="input" readonly />
          </div>
          <div class="form-field eform-full">
            <label class="form-label">위치</label>
            <input type="text" id="location" class="input" placeholder="예: 3층 진료실" />
          </div>
          <div class="form-field eform-full">
            <label class="form-label">메모</label>
            <textarea id="memo" class="input textarea" rows="3" placeholder="추가로 관리해야 할 사항을 입력하세요"></textarea>
          </div>
        </div>
      </div>

    </div><!-- /eform-col left -->

    <!-- 우측: 업체 / 사용자 정보 -->
    <div class="eform-col eform-col--stretch">

      <!-- 구매/제조 정보 -->
      <div class="eform-section">
        <div class="eform-section-head">
          <i class="ti ti-receipt"></i>
          <span>구매 / 제조 정보</span>
          <span class="eform-section-desc">구매 및 제조 관련 정보</span>
        </div>
        <div class="eform-grid eform-grid--2">
          <div class="form-field">
            <label class="form-label">제조사</label>
            <input type="text" id="manufacturer" class="input" placeholder="제조사를 입력하세요" />
          </div>
          <div class="form-field">
            <label class="form-label">구매처</label>
            <input type="text" id="vendor" class="input" placeholder="구매처를 입력하세요" />
          </div>
          <div class="form-field">
            <label class="form-label">제조일자</label>
            <input type="date" id="manufacture_date" class="input" />
          </div>
          <div class="form-field">
            <label class="form-label">취득일자</label>
            <input type="date" id="purchase_date" class="input" />
          </div>
          <div class="form-field">
            <label class="form-label">취득가액</label>
            <input type="text" inputmode="numeric" id="acquisition_cost" class="input" placeholder="숫자만 입력" />
          </div>
          <div class="form-field">
            <label class="form-label">유지보수 종료일</label>
            <input type="date" id="maintenance_end_date" class="input" />
          </div>
        </div>
      </div>

      <!-- 담당자 정보 -->
      <div class="eform-section">
        <div class="eform-section-head">
          <i class="ti ti-user"></i>
          <span>담당자 정보</span>
          <span class="eform-section-desc">업체 및 부서 담당자 정보</span>
        </div>
        <div class="eform-grid eform-grid--2">
          <div class="form-field">
            <label class="form-label">업체 담당자</label>
            <input type="text" id="manager_name" class="input" placeholder="업체 담당자명을 입력하세요" />
          </div>
          <div class="form-field">
            <label class="form-label">업체 연락처</label>
            <input type="text" id="manager_phone" class="input" placeholder="업체 연락처를 입력하세요" />
          </div>
          <div class="form-field eform-full">
            <label class="form-label">부서 담당자</label>
            <input type="text" id="current_user" class="input" placeholder="부서 담당자를 입력하세요" />
          </div>
        </div>
      </div>

    </div><!-- /eform-col right -->

    <!-- 하단 1단: 장비 사진 -->
    <div class="eform-section eform-photo-row">
      <div class="eform-section-head">
        <i class="ti ti-photo"></i>
        <span>장비 사진</span>
        <span class="eform-section-desc">장비 식별이 가능한 사진을 등록하세요</span>
      </div>
      <div class="eform-photo-wrap">
        <div class="eform-photo-preview" id="photoPreviewWrap">
          <img id="photoPreviewImage" class="eform-photo-img is-hidden" alt="장비 사진 미리보기" />
          <div id="photoPreviewEmpty" class="eform-photo-empty">
            <i class="ti ti-photo-off"></i>
            <span>등록된 사진이 없습니다.</span>
          </div>
        </div>
        <div class="eform-photo-right">
          <div class="eform-photo-meta" id="photoExistingMeta" style="display:none;">
            <i class="ti ti-circle-check" style="color:#22c55e;"></i> 현재 등록된 사진이 있습니다.
          </div>
          <div class="eform-photo-actions">
            <input type="file" id="photoInput" class="eform-file-input" accept="image/*" />
            <label for="photoInput" class="btn btn-sm">
              <i class="ti ti-upload"></i> 사진 선택
            </label>
            <span id="photoFileName" class="eform-file-name">선택된 파일 없음</span>
            <button type="button" class="btn btn-sm btn-danger" id="removePhotoBtn" style="display:none;">
              <i class="ti ti-trash"></i> 제거
            </button>
          </div>
          <p class="eform-photo-help">업로드 전에 자동 압축됩니다.</p>
        </div>
      </div>
    </div>

  </form>

  <!-- 일괄 등록 섹션 -->
  <div id="bulkSection" class="eform-body" style="display:none;">
    <div class="eform-section">
      <div class="eform-section-head">
        <i class="ti ti-table-import"></i>
        <span>엑셀 일괄 등록</span>
        <span class="eform-section-desc">엑셀 파일로 여러 장비를 한 번에 등록합니다. 오류 발생 시 전체 롤백됩니다.</span>
      </div>
      <div class="eform-bulk-toolbar">
        <button type="button" class="btn btn-sm" id="downloadTemplateBtn">
          <i class="ti ti-download"></i> 템플릿 다운로드
        </button>
        <span class="eform-bulk-desc"><strong>굵은 항목</strong>은 필수값입니다.</span>
      </div>
      <div class="eform-bulk-upload">
        <input type="file" id="bulkFileInput" class="eform-file-input" accept=".xlsx,.xls" />
        <label for="bulkFileInput" class="btn btn-sm">
          <i class="ti ti-upload"></i> 파일 선택
        </label>
        <span id="bulkFileName" class="eform-file-name">선택된 파일 없음</span>
      </div>
      <div id="bulkPreviewWrap" style="display:none;">
        <div class="eform-bulk-preview-head">
          <span id="bulkPreviewCount" class="eform-bulk-count"></span>
          <span id="bulkPreviewError" class="eform-bulk-error"></span>
        </div>
        <div class="eform-bulk-table-wrap">
          <table class="bulk-table" id="bulkPreviewTable"></table>
        </div>
      </div>
      <div class="eform-bulk-actions">
        <button type="button" id="bulkSubmitBtn" class="btn btn-sm btn-primary" style="display:none;">
          <i class="ti ti-upload"></i> 일괄 등록
        </button>
      </div>
    </div>
  </div>

</div>

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/utils.js"></script>
<script src="../../assets/js/core/auth.js"></script>
<script src="../../assets/js/core/org-select.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="../../assets/js/equipment/equipment-form.js"></script>
<script>
// URL mode 파라미터로 단건/일괄 전환
(function() {
  var mode = new URLSearchParams(location.search).get('mode');
  if (mode === 'bulk') {
    var form = document.getElementById('equipmentForm');
    var bulk = document.getElementById('bulkSection');
    var submitBtn = document.getElementById('submitButton');
    if (form) form.style.display = 'none';
    if (bulk) bulk.style.display = '';
    if (submitBtn) submitBtn.style.display = 'none';
    var titleEl = document.getElementById('pageTitle');
    var descEl  = document.getElementById('pageDesc');
    if (titleEl) titleEl.textContent = '일괄 등록';
    if (descEl)  descEl.textContent  = '엑셀 파일로 여러 장비를 한 번에 등록합니다.';
  }
})();
</script>

<div id="globalLoading" aria-hidden="true">
  <div class="global-loading__dialog">
    <div class="global-loading__spinner" aria-hidden="true"></div>
    <div class="global-loading__text" id="globalLoadingText">불러오는 중...</div>
  </div>
</div>
</body>
</html>
