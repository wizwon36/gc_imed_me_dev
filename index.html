<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 · MSO관리팀 업무지원 시스템</title>
  <link rel="stylesheet" href="assets/css/common.css">
  <link rel="stylesheet" href="assets/css/pages/auth.css">
  <link rel="stylesheet" href="assets/font/tabler-icons/tabler-icons.min.css">
</head>
<body class="auth-page">

  <div class="auth-layout">

    <!-- 좌측 브랜드 패널 -->
    <div class="auth-panel">
      <div class="auth-panel-inner">
        <div class="auth-panel-logo">
          <span>+</span>
        </div>
        <h1 class="auth-panel-title">MSO관리팀<br>업무지원 시스템</h1>

        <div class="auth-panel-apps">
          <div class="auth-app-chip"><i class="ti ti-stethoscope"></i> 의료장비</div>
          <div class="auth-app-chip"><i class="ti ti-report-money"></i> 월마감</div>
          <div class="auth-app-chip"><i class="ti ti-chart-line"></i> 정도관리</div>
          <div class="auth-app-chip"><i class="ti ti-clipboard-list"></i> 업무일정</div>
          <div class="auth-app-chip"><i class="ti ti-chart-bar"></i> 통계</div>
          <div class="auth-app-chip"><i class="ti ti-photo"></i> 사인물</div>
        </div>
      </div>
    </div>

    <!-- 우측 로그인 폼 -->
    <div class="auth-form-panel">
      <div class="auth-form-wrap">

        <div class="auth-form-header">
          <h2 class="auth-form-title">로그인</h2>
          <p class="auth-form-sub">계정 정보를 입력하세요</p>
        </div>

        <div class="auth-form">
          <div class="auth-field">
            <label for="userEmail">이메일</label>
            <div class="auth-input-wrap">
              <i class="ti ti-mail"></i>
              <input type="email" id="userEmail"
                placeholder="이메일 주소"
                autocomplete="username">
            </div>
          </div>

          <div class="auth-field">
            <label for="userPassword">비밀번호</label>
            <div class="auth-input-wrap">
              <i class="ti ti-lock"></i>
              <input type="password" id="userPassword"
                placeholder="비밀번호"
                autocomplete="current-password">
            </div>
          </div>

          <div id="authMessage" class="auth-message"></div>

          <button type="button" class="auth-btn" id="loginBtn">
            로그인
          </button>

          <div class="auth-links">
            <span>계정이 없으신가요?</span>
            <a href="pages/auth/register.html">가입 신청</a>
          </div>

          <div class="auth-cache-reset">
            <button type="button" id="clearCacheBtn">
              <i class="ti ti-refresh"></i> 접속 문제 · 캐시 초기화
            </button>
          </div>
        </div>

      </div>
    </div>

  </div>

  <div id="globalLoading" aria-hidden="true">
    <div class="global-loading__dialog">
      <div class="global-loading__spinner" aria-hidden="true"></div>
      <div class="global-loading__text" id="globalLoadingText">로딩 중...</div>
    </div>
  </div>

  <script src="assets/js/core/config.js"></script>
  <script src="assets/js/core/utils.js"></script>
  <script src="assets/js/core/api.js"></script>
  <script src="assets/js/core/auth.js"></script>
</body>
</html>
