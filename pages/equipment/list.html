<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장비 목록</title>
  <link rel="stylesheet" href="../../assets/css/common.css" />
  <link rel="stylesheet" href="../../assets/css/pages/equipment-list.css" />
  <style>
    @media print {
      @page { size: A4 portrait; margin: 0; }

      body > *:not(#printLabelOverlay) { display: none !important; }
      #printLabelOverlay { display: block !important; margin: 0; padding: 0; }

      .plabel-page { page-break-after: always; break-after: page; }
      .plabel-page:last-child { page-break-after: avoid; break-after: avoid; }
      .plabel-page--grid   { display: grid !important; width: 210mm; box-sizing: border-box; }
      .plabel-page--single { display: flex !important; justify-content: center; align-items: flex-start; padding: 10mm 0; }
      .plabel-empty { visibility: hidden; }

      /* ── prlabel 공통 ── */
      .prlabel {
        display: grid; box-sizing: border-box;
        border: 1px solid #111827;
        background: white; overflow: hidden;
        page-break-inside: avoid; break-inside: avoid;
      }
      .prlabel-body    { display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
      .prlabel-rows    { display: flex; flex-direction: column; }
      .prlabel-row     { display: grid; align-items: center; }
      .prlabel-hospital { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
      .prlabel-title   { font-weight: 800; color: #1e293b; line-height: 1.1; }
      .prlabel-key     { color: #64748b; white-space: nowrap; }
      .prlabel-val     { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-weight: 500; }
      .prlabel-id      { overflow: hidden; white-space: nowrap; color: #1e40af; font-weight: 700; }
      .prlabel-qr      { display: flex; align-items: center; justify-content: center; align-self: center; }
      .prlabel-qr img  { display: block; width: 100%; height: 100%; }

      /* ── 90×48mm — label-print 기준 ── */
      .prlabel--90x48 {
        width: 90mm; min-height: 48mm;
        padding: 4mm; border-radius: 4mm;
        gap: 3.5mm; grid-template-columns: 1fr 26mm;
        align-items: center;
      }
      .prlabel--90x48 .prlabel-hospital { font-size: 7.5pt; margin-bottom: 1.5mm; }
      .prlabel--90x48 .prlabel-title    { font-size: 15pt;  margin: 0 0 2mm; }
      .prlabel--90x48 .prlabel-rows     { gap: 1.4mm; }
      .prlabel--90x48 .prlabel-row      { grid-template-columns: 13mm 1fr; gap: 1.4mm 2mm; }
      .prlabel--90x48 .prlabel-key      { font-size: 7.5pt; }
      .prlabel--90x48 .prlabel-val      { font-size: 8pt; }
      .prlabel--90x48 .prlabel-id       { font-size: 11pt; }
      .prlabel--90x48 .prlabel-qr       { width: 24mm; height: 24mm; padding: 1.2mm; border-radius: 3mm; }

      /* ── 70×40mm — label-print 기준 ── */
      .prlabel--70x40 {
        width: 70mm; min-height: 40mm;
        padding: 2.8mm; border-radius: 3mm;
        gap: 2.5mm; grid-template-columns: 1fr 19mm;
        align-items: center;
      }
      .prlabel--70x40 .prlabel-hospital { font-size: 6pt;   margin-bottom: 1.2mm; }
      .prlabel--70x40 .prlabel-title    { font-size: 11pt;  margin: 0 0 1.5mm; }
      .prlabel--70x40 .prlabel-rows     { gap: 1mm; }
      .prlabel--70x40 .prlabel-row      { grid-template-columns: 11mm 1fr; gap: 1mm 1.4mm; }
      .prlabel--70x40 .prlabel-key      { font-size: 6pt; }
      .prlabel--70x40 .prlabel-val      { font-size: 6.5pt; }
      .prlabel--70x40 .prlabel-id       { font-size: 8pt;   letter-spacing: -0.02em; line-height: 1.05; }
      .prlabel--70x40 .prlabel-qr       { width: 17mm; height: 17mm; padding: 1mm; border-radius: 2mm; }

      /* ── 50×30mm — label-print 기준 ── */
      .prlabel--50x30 {
        width: 50mm; min-height: 30mm;
        padding: 2.2mm; border-radius: 2.6mm;
        gap: 2mm; grid-template-columns: 1fr 15mm;
        align-items: center;
      }
      .prlabel--50x30 .prlabel-hospital { font-size: 5.8pt; margin-bottom: 1mm; }
      .prlabel--50x30 .prlabel-title    { font-size: 9.5pt; margin: 0 0 1.2mm; }
      .prlabel--50x30 .prlabel-rows     { gap: 1mm; }
      .prlabel--50x30 .prlabel-row      { grid-template-columns: 10mm 1fr; gap: 1mm 1.2mm; }
      .prlabel--50x30 .prlabel-key      { font-size: 5.4pt; }
      .prlabel--50x30 .prlabel-val      { font-size: 5.8pt; }
      .prlabel--50x30 .prlabel-id       { font-size: 6.8pt; white-space: nowrap; letter-spacing: -0.03em; }
      .prlabel--50x30 .prlabel-qr       { width: 13mm; height: 13mm; padding: 0.8mm; border-radius: 2mm; }
    }
  </style>
</head>
<body class="portal-page equipment-list-page">
  <div class="container page-shell">
    <section class="top-brand-bar portal-topbar portal-hero-card equipment-list-topbar">
      <div class="top-brand-left">
        <div class="top-brand-logo">+</div>
        <div class="top-brand-texts">
          <strong class="top-brand-title">MSO관리팀 업무지원 시스템</strong>
          <span class="top-brand-sub">장비 검색 · 상태 · 상세</span>
        </div>
      </div>

      <div class="top-brand-actions portal-top-actions equipment-list-top-actions">
        <a class="portal-header-btn portal-header-btn--secondary" href="../../portal.html">HOME</a>
        <a class="portal-header-btn portal-header-btn--secondary" href="dashboard.html">대시보드</a>
        <a class="portal-header-btn portal-header-btn--primary" id="createEquipmentBtn" href="form.html">장비등록</a>
      </div>
    </section>

    <section class="page-hero-simple">
      <div>
        <h1 class="page-title">장비 목록</h1>
      </div>
    </section>

    <div id="messageBox" class="message-box"></div>

    <section class="card filter-card">
      <div class="section-head">
        <h2 class="section-title">장비 검색</h2>
        <div class="sub-text" id="listSearchHelp">
          장비번호, 장비명, 모델명, 부서, 상태, 제조사 기준으로 조회할 수 있습니다.
        </div>
      </div>

      <form id="searchForm">
        <div class="form-grid two-col">
          <label class="form-field full-col">
            <span class="form-label">검색어</span>
            <input
              type="text"
              id="keyword"
              class="input"
              placeholder="장비번호, 장비명, 모델명, 시리얼, 부서 등"
            />
          </label>

          <label class="form-field">
            <span class="form-label">의원</span>
            <select id="clinic_code" class="input"></select>
          </label>

          <label class="form-field">
            <span class="form-label">팀</span>
            <select id="team_code" class="input"></select>
          </label>

          <label class="form-field">
            <span class="form-label">상태</span>
            <select id="status" class="input"></select>
          </label>

          <label class="form-field">
            <span class="form-label">제조사</span>
            <input
              type="text"
              id="manufacturer"
              class="input"
              placeholder="제조사명 입력"
            />
          </label>
        </div>

        <div class="filter-actions">
          <div class="filter-actions-left">
            <div class="inline-field">
              <label for="page_size" class="form-label">페이지당 표시</label>
              <select id="page_size" class="input input-sm"></select>
            </div>
          </div>

          <div class="filter-actions-right">
            <button type="submit" class="btn-primary">조회</button>
            <button type="button" class="btn-secondary" id="resetFilterBtn">초기화</button>
            <button type="button" class="btn-secondary" id="exportExcelBtn">엑셀 다운로드</button>
          </div>
        </div>
      </form>
    </section>

    <section class="equipment-list-wrap">
      <div class="equipment-list-toolbar">
        <div class="equipment-list-summary" id="listSummary">최근 등록 장비를 불러오는 중...</div>
        <div class="equipment-list-toolbar-actions">
          <select id="bulkLabelSizeSelect" class="input input--sm" style="display:none;">
            <option value="size-90x48">90 × 48 mm</option>
            <option value="size-70x40">70 × 40 mm</option>
          </select>
          <select id="bulkLayoutSelect" class="input input--sm" style="display:none;">
            <option value="2x5">격자 — 2×5 (10칸)</option>
          </select>
          <button type="button" class="btn btn-sm" id="bulkLabelBtn" style="display:none;">
            🏷️ 라벨 일괄 출력 (<span id="bulkLabelCount">0</span>)
          </button>
          <button type="button" class="btn btn-sm btn-success" id="bulkInspectionCertBtn" style="display:none;">
            📄 검수확인서 (<span id="bulkInspectionCertCount">0</span>)
          </button>
        </div>
      </div>

      <div id="equipmentList" class="equipment-list-grid">
        <div class="empty-box">불러오는 중...</div>
      </div>

      <div id="paginationArea" class="pagination-area"></div>
    </section>
  </div>

  <script src="../../assets/js/core/config.js"></script>
  <script src="../../assets/js/core/api.js"></script>
  <script src="../../assets/js/core/utils.js"></script>
  <script src="../../assets/js/core/auth.js"></script>
  <script src="../../assets/js/core/app-permission.js"></script>
  <script src="../../assets/js/core/org-select.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <script src="../../assets/libs/qrcode.min.js"></script>
  <script src="../../assets/js/equipment/inspection-cert.js"></script>
  <script src="../../assets/js/equipment/equipment-list.js"></script>

  <div id="globalLoading" aria-hidden="true">
    <div class="global-loading__dialog">
      <div class="global-loading__spinner" aria-hidden="true"></div>
      <div class="global-loading__text" id="globalLoadingText">불러오는 중...</div>
    </div>
  </div>
</body>
</html>
