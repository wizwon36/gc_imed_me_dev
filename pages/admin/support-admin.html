<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수정요청 관리 - MSO관리팀 업무포털</title>
  <link rel="stylesheet" href="../../assets/css/common.css" />
  <style>
    :root {
      --page-max-width: 1440px;
    }
    .support-page {
      max-width: var(--page-max-width);
      margin: 0 auto;
      padding: 28px 20px 48px;
    }
    body {
      background: linear-gradient(180deg, #f8fbff 0%, #f8fafc 100%);
      min-height: 100vh;
    }

    /* 관리자 페이지 공통 너비 (logs, users 와 동일) */
    .page-shell {
      max-width: var(--page-max-width) !important;
    }

    .form-control-sm {
      height: 38px;
      padding: 0 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      background: var(--surface);
      color: var(--text-primary);
    }
    .support-filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* ── 모바일 필터바: 1행=콤보2+날짜범위, 2행=검색+버튼 ── */
    @media (max-width: 600px) {
      .support-filter-bar {
        flex-wrap: wrap;
        gap: 6px;
      }
      /* 콤보박스: 압축 */
      .support-filter-bar #filterApp,
      .support-filter-bar #filterStatus {
        flex: 1 1 80px;
        min-width: 0;
        font-size: 12px;
        padding: 0 4px;
      }
      /* 날짜범위: 1행 끝에 붙음 */
      .support-filter-bar .date-range-wrap {
        flex: 2 1 160px;
        min-width: 0;
      }
      .date-range-wrap input[type="date"] {
        width: 0;
        flex: 1;
        font-size: 12px;
        padding: 0 4px;
        min-width: 0;
      }
      /* 검색어: 두 번째 줄 전체 */
      .support-filter-bar #filterKeyword {
        flex: 1 1 100%;
        min-width: 0 !important;
        order: 10;
      }
      /* 조회 버튼: 두 번째 줄 전체 */
      .support-filter-bar #filterBtn {
        flex: 1 1 100%;
        order: 11;
      }
    }

    /* ── 모바일 그리드 컬럼 숨김 ── */
    /* 900px 이하: 내용 미리보기/요청자/답변 숨김 */
    @media (max-width: 900px) {
      .support-grid .col-preview,
      .support-grid .th-preview { display: none; }
      .support-grid .col-meta:not(.col-date),
      .support-grid .th-meta { display: none; }
      .support-grid .col-reply,
      .support-grid .th-reply { display: none; }
    }
    /* 600px 이하: 카테고리도 숨김 */
    @media (max-width: 600px) {
      .support-grid .col-app,
      .support-grid .th-app { display: none; }
      /* 유형/상태 폭 더 타이트하게 */
      .support-grid .th-type  { width: 70px !important; }
      .support-grid .th-status { width: 46px !important; }
      /* 제목 컬럼 넓게 */
      .support-grid .col-title { width: auto; max-width: none; }
    }
    /* 400px 이하: 유형/상태도 숨김 → 제목/일시만 */
    @media (max-width: 400px) {
      .support-grid .col-type,
      .support-grid .col-status,
      .support-grid .th-type,
      .support-grid .th-status { display: none; }
    }
    /* 날짜 필터 */
    .date-range-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .date-range-wrap input[type="date"] {
      height: 38px;
      padding: 0 8px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      background: var(--surface);
      color: var(--text-primary);
      cursor: pointer;
      width: 140px;
    }
    .date-range-wrap input[type="date"]:focus {
      outline: none;
      border-color: var(--blue);
    }
    .date-range-sep {
      font-size: 13px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
        /* 통계 바 */
    .support-stat-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .support-stat-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .support-stat-chip:hover { border-color: var(--blue); }
    .support-stat-chip--all {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: var(--blue);
    }
    .support-stat-chip--all .support-stat-chip-count {
      background: var(--blue);
      color: #fff;
    }
    .support-stat-chip-count {
      background: var(--blue-soft);
      color: var(--blue);
      border-radius: 999px;
      padding: 0 7px;
      font-size: 11px;
    }

    /* ── 그리드 테이블 ── */
    .support-grid {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;
    }
    .support-grid thead tr {
      background: var(--surface-soft, #f8fafc);
      border-bottom: 2px solid var(--border);
    }
    .support-grid thead th {
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-align: left;
      white-space: nowrap;
      letter-spacing: 0.03em;
    }
    .support-grid thead th.th-center { text-align: center; }
    .support-grid tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .support-grid tbody tr:hover { background: var(--hover, #f1f5f9); }
    .support-grid tbody tr.is-pending     { border-left: 3px solid #f59e0b; }
    .support-grid tbody tr.is-in_progress { border-left: 3px solid #2563eb; }
    .support-grid tbody tr.is-completed   { border-left: 3px solid #10b981; }
    .support-grid tbody tr.is-rejected    { border-left: 3px solid #ef4444; }
    .support-grid td {
      padding: 10px 8px;
      color: var(--text-primary);
      vertical-align: middle;
      overflow: hidden;
      white-space: nowrap;
    }
    /* 뱃지 컬럼: 잘리지 않도록 overflow visible, 최소 폭 보장 */
    .support-grid td.col-center {
      text-align: center;
      vertical-align: middle;
      overflow: visible;
    }
    .support-grid td.col-type,
    .support-grid td.col-status {
      overflow: visible;
    }
    /* 말줄임은 제목·미리보기 컬럼에만 */
    .support-grid td.col-title,
    .support-grid td.col-preview {
      text-overflow: ellipsis;
      overflow: hidden;
    }
    .support-grid td.col-title {
      font-weight: 600;
    }
    .support-grid td.col-preview {
      color: var(--text-secondary);
      font-size: 12px;
    }
    .support-grid td.col-meta {
      font-size: 12px;
      color: var(--text-muted);
    }
    .support-grid td.col-reply {
      text-align: center;
      font-size: 14px;
    }

    /* ── 페이지네이션 ── */
    .support-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .pg-btn {
      min-width: 32px;
      height: 32px;
      padding: 0 8px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .pg-btn:hover   { border-color: var(--blue); color: var(--blue); }
    .pg-btn.is-active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }
    .pg-btn:disabled { opacity: 0.35; cursor: default; }
    .support-badge {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .support-badge--app          { background:#f0f4ff; color:#2563eb; border:1px solid #bfdbfe; }
    .support-badge--cat          { background:#f5f3ff; color:#6d28d9; border:1px solid #ddd6fe; }
    .support-badge--PENDING      { background:#fffbeb; color:#92400e; border:1px solid #fde68a; }
    .support-badge--IN_PROGRESS  { background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; }
    .support-badge--COMPLETED    { background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
    .support-badge--REJECTED     { background:#fef2f2; color:#991b1b; border:1px solid #fca5a5; }

    /* 모달 */
    .support-modal { position:fixed; inset:0; z-index:1000; }
    .support-modal-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.45); }
    .support-modal-box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 820px;
      max-height: 92vh;
      background: var(--surface);
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .support-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .support-modal-title  { margin:0; font-size:18px; font-weight:800; }
    .support-modal-close  { background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-muted); }
    .support-modal-close:hover { color:var(--text-primary); }
    .support-modal-body   { padding:20px 24px; overflow-y:auto; flex:1; }
    .support-modal-footer {
      display: block;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface-soft);
    }
    .support-detail-row     { margin-bottom:14px; }
    .support-detail-row--requester {
      padding: 10px 14px;
      background: var(--background);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      line-height: 1.6;
    }
    .support-detail-label   { font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px; }
    .support-detail-value   { font-size:14px; color:var(--text-primary); }
    .support-detail-content {
      background: var(--surface-soft);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .support-process-form   { display:flex; flex-direction:column; gap:12px; }
    .support-process-label  { font-size:13px; font-weight:700; color:var(--text-primary); margin-bottom:4px; }
    .support-process-select, .support-process-textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      background: var(--surface);
      color: var(--text-primary);
      box-sizing: border-box;
    }
    .support-process-select:focus,
    .support-process-textarea:focus { outline:none; border-color:var(--blue); }
    .support-process-textarea { resize:vertical; min-height:100px; }
    .support-process-actions { display:flex; gap:8px; justify-content:center; margin-top:4px; flex-wrap:wrap; width:100%; }
    .support-process-actions .btn { word-break:keep-all; white-space:nowrap; min-width:100px; text-align:center; }
    .support-existing-reply {
      margin-bottom: 14px;
      padding: 12px 14px;
      background: var(--success-bg);
      border: 1px solid #a7f3d0;
      border-radius: var(--radius-md);
    }
    .support-existing-reply-label { font-size:12px; font-weight:700; color:var(--success-text); margin-bottom:6px; }
    .support-existing-reply-text  { font-size:13px; white-space:pre-wrap; }

  /* ── 스켈레톤 로딩 ── */
  @keyframes shimmer {
    0%   { background-position: -600px 0; }
    100% { background-position:  600px 0; }
  }
  .sk {
    background: linear-gradient(90deg, #f0f2f5 25%, #e4e6ea 50%, #f0f2f5 75%);
    background-size: 600px 100%;
    animation: shimmer 1.4s infinite linear;
    border-radius: 8px;
  }
  .sk-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    margin-bottom: 10px;
  }
  .sk-badge-row { display:flex; gap:8px; margin-bottom:10px; }
  .sk-badge  { height:22px; width:64px; border-radius:999px; }
  .sk-title  { height:18px; width:55%; border-radius:6px; margin-bottom:8px; }
  .sk-text   { height:13px; width:80%; border-radius:6px; }
  .sk-text-sm{ height:12px; width:40%; border-radius:6px; margin-top:8px; }

  
    /* ── 첨부파일 칩 ── */
    .support-file-list {
      display: flex; flex-direction: column; gap: 6px; margin-top: 4px;
    }
    .support-file-chip {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 7px 12px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 13px; color: #1d4ed8;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
      max-width: 100%; overflow: hidden;
    }
    .support-file-chip:hover { background: #e0e7ff; border-color: #a5b4fc; }
    .support-file-chip-icon { font-size: 14px; flex-shrink: 0; }
    .support-file-chip-name {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .support-file-chip--error {
      color: #dc2626; background: #fef2f2; border-color: #fca5a5;
    }
      .btn-secondary {
      background: var(--surface); color: var(--text-primary);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover { background: var(--hover); border-color: var(--blue); color: var(--blue); }
  </style>
</head>
<body class="portal-page admin-body">
  <div class="support-page">
  <section class="top-brand-bar portal-topbar portal-hero-card" style="margin:0 0 12px;">
    <div class="top-brand-left">
      <div class="top-brand-logo">+</div>
      <div class="top-brand-texts">
        <strong class="top-brand-title">수정요청 관리</strong>
        <span class="top-brand-sub">접수된 수정요청을 처리합니다</span>
      </div>
    </div>
    <div class="top-brand-actions portal-top-actions">
      <a class="portal-header-btn portal-header-btn--secondary" href="../../portal.html">HOME</a>
    </div>
  </section>

    <div id="messageBox" class="message-box"></div>

    <!-- 필터 -->
    <div class="support-filter-bar">
      <select id="filterApp" class="form-control-sm">
        <option value="">전체 카테고리</option>
      </select>
      <select id="filterStatus" class="form-control-sm">
        <option value="">전체 상태</option>
        <option value="PENDING">접수</option>
        <option value="IN_PROGRESS">처리중</option>
        <option value="COMPLETED">완료</option>
        <option value="REJECTED">반려</option>
      </select>
      <div class="date-range-wrap">
        <input type="date" id="filterDateFrom" title="시작일" />
        <span class="date-range-sep">~</span>
        <input type="date" id="filterDateTo" title="종료일" />
      </div>
      <input type="text" id="filterKeyword" class="form-control-sm" placeholder="제목, 내용, 요청자 검색" style="flex:1;min-width:160px;" />
      <button type="button" id="filterBtn" class="btn" style="min-height:38px;padding:0 16px;font-size:14px;">조회</button>
    </div>

    <!-- 통계 뱃지 -->
    <div class="support-stat-bar" id="statBar"></div>

    <!-- 목록 -->
    <!-- 스켈레톤 -->
    <div id="skeletonArea">
      <div class="sk-card" id="skCard1">
        <div class="sk-badge-row"><div class="sk sk-badge"></div><div class="sk sk-badge"></div><div class="sk sk-badge"></div></div>
        <div class="sk sk-title"></div><div class="sk sk-text"></div><div class="sk sk-text-sm"></div>
      </div>
      <div class="sk-card" id="skCard2">
        <div class="sk-badge-row"><div class="sk sk-badge"></div><div class="sk sk-badge"></div><div class="sk sk-badge"></div></div>
        <div class="sk sk-title"></div><div class="sk sk-text"></div><div class="sk sk-text-sm"></div>
      </div>
    </div>

    <!-- 그리드 테이블 -->
    <div>
      <table class="support-grid" id="requestList" style="display:none;">
        <thead>
          <tr>
            <th class="th-center th-app"    style="width:88px;">카테고리</th>
            <th class="th-center th-type"   style="width:80px;">유형</th>
            <th class="th-center th-status" style="width:56px;">상태</th>
            <th class="th-center th-title"  style="width:28%;">제목</th>
            <th class="th-center th-preview">내용 미리보기</th>
            <th class="th-center th-meta"   style="width:72px;">요청자</th>
            <th class="th-center th-date"   style="width:96px;">일시</th>
            <th class="th-center th-reply"  style="width:36px;">답변</th>
          </tr>
        </thead>
        <tbody id="requestBody"></tbody>
      </table>
    </div>

    <div id="paginationBar" class="support-pagination" style="display:none;"></div>
    <div id="emptyBox" class="empty-box" style="display:none;">접수된 요청이 없습니다.</div>

    <!-- 처리 모달 -->
    <div id="processModal" class="support-modal" style="display:none;" role="dialog" aria-modal="true">
      <div class="support-modal-backdrop" id="modalBackdrop"></div>
      <div class="support-modal-box">
        <div class="support-modal-header">
          <h3 class="support-modal-title" id="modalTitle">요청 처리</h3>
          <button type="button" class="support-modal-close" id="modalClose">✕</button>
        </div>
        <div class="support-modal-body" id="modalBody"></div>
        <div class="support-modal-footer" id="modalFooter"></div>
      </div>
    </div>

  </div>

  <script src="../../assets/js/core/config.js"></script>
  <script src="../../assets/js/core/api.js"></script>
  <script src="../../assets/js/core/utils.js"></script>
  <script src="../../assets/js/core/auth.js"></script>
  <script src="../../assets/js/admin/support-admin.js"></script>

  <div id="globalLoading" aria-hidden="true">
    <div class="global-loading__dialog">
      <div class="global-loading__spinner" aria-hidden="true"></div>
      <div class="global-loading__text" id="globalLoadingText">불러오는 중...</div>
    </div>
  </div>
</body>
</html>
