<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공지사항 관리</title>

  <link rel="stylesheet" href="../../assets/css/common.css" />

  <style>
    :root {
      --page-max-width: 1440px;
      --card-radius: 20px;
      --card-border: 1px solid rgba(15, 23, 42, 0.08);
      --card-shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
      --text-subtle: #64748b;
      --text-strong: #0f172a;
      --bg-soft: #f8fafc;
      --bg-panel: #ffffff;
      --line-soft: rgba(148, 163, 184, 0.22);
      --primary-color: #2563eb;
      --danger-color: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text-strong);
      font-family: Pretendard, "Noto Sans KR", Arial, sans-serif;
    }

    .notice-admin-page {
      max-width: var(--page-max-width);
      margin: 0 auto;
      padding: 12px 20px 24px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 10px;
    }

    .page-title-wrap h1 {
      margin: 0 0 4px;
      font-size: 24px;
      font-weight: 800;
    }

    .page-title-wrap p {
      margin: 0;
      color: var(--text-subtle);
      font-size: 13px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 30px;
      padding: 0 16px;
      border-radius: 10px;
      border: 1px solid var(--line-soft);
      background: #fff;
      color: var(--text-strong);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn--primary {
      background: var(--primary-color);
      border-color: var(--primary-color);
      color: #fff;
    }

    .btn--danger {
      background: var(--danger-color);
      border-color: var(--danger-color);
      color: #fff;
    }

    .btn--ghost {
      background: transparent;
      border-color: transparent;
    }

    .card {
      background: var(--bg-panel);
      border: var(--card-border);
      border-radius: var(--card-radius);
      box-shadow: var(--card-shadow);
      padding: 8px 16px;
    }

    table.notice-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;  /* 컬럼 너비 고정 */
    }

    table.notice-table th,
    table.notice-table td {
      padding: 0 10px;
      height: 18px;
      border-bottom: 1px solid var(--line-soft);
      vertical-align: middle;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    table.notice-table th:last-child,
    table.notice-table td:last-child {
      overflow: visible;
    }

    /* 제목 열만 좌측 정렬, 나머지는 가운데 정렬 */
    table.notice-table th { 
      color: var(--text-subtle);
      font-weight: 700;
      font-size: 12px;
      text-align: center;   /* ★ 헤더 가운데 정렬 */
    }

    table.notice-table th:nth-child(2),
    table.notice-table td:nth-child(2) {
      text-align: left;     /* ★ 제목 열만 좌측 유지 */
    }

    table.notice-table td {
      text-align: center;   /* ★ 내용 가운데 정렬 */
    }

    .notice-title-cell {
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pin-badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 7px;
      border-radius: 999px;
      background: #fff7ed;
      color: #c2410c;
      font-size: 10px;
      font-weight: 700;
    }

    .top-brand-actions { flex-wrap: nowrap; }

    .row-actions {
      display: inline-flex;   /* ★ inline-flex로 셀 가운데 정렬과 어울리게 */
      gap: 4px;
      white-space: nowrap;
    }

    .row-actions .btn {
      height: 16px;
      padding: 0 8px;
      font-size: 10px;
      border-radius: 4px;
      line-height: 16px;
    }

    .empty-row td {
      text-align: center;
      color: var(--text-subtle);
      padding: 32px 0;
    }

    /* ── 모달 ── */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.5);
    }

    .modal__box {
      position: relative;
      width: min(560px, 92vw);
      max-height: 86vh;
      overflow-y: auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: var(--card-shadow);
      padding: 22px 24px;
    }

    .modal__head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .modal__head h2 { margin: 0; font-size: 18px; font-weight: 800; }

    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-subtle);
    }
    .form-row input[type="text"],
    .form-row input[type="date"],
    .form-row textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line-soft);
      font-size: 14px;
      font-family: inherit;
    }
    .form-row textarea { min-height: 140px; resize: vertical; }

    .form-row-inline { display: flex; gap: 12px; }
    .form-row-inline > div { flex: 1; }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
    }

    .modal__footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 18px;
    }

    .form-help {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-subtle);
    }

    @media (max-width: 760px) {
      .notice-admin-page { padding: 20px 14px 34px; }

      .page-header { flex-direction: column; }
      .page-header #btnNewNotice { width: 100%; }

      .card { padding: 14px; overflow-x: auto; }
      table.notice-table { min-width: 480px; }
    }

  </style>
</head>
<body class="portal-page admin-body">
  <div class="notice-admin-page">
  <section class="top-brand-bar portal-topbar portal-hero-card" style="margin:0 0 12px;">
    <div class="top-brand-left">
      <div class="top-brand-logo">+</div>
      <div class="top-brand-texts">
        <strong class="top-brand-title">공지사항 관리</strong>
        <span class="top-brand-sub">포털 상단 공지 등록 · 노출기간 관리</span>
      </div>
    </div>
    <div class="top-brand-actions portal-top-actions">
      <button type="button" class="portal-header-btn portal-header-btn--primary" id="btnNewNotice">+ 새 공지 등록</button>
      <a class="portal-header-btn portal-header-btn--secondary" href="../../portal.html">HOME</a>
      <button type="button" id="logoutBtn" class="portal-header-btn portal-header-btn--secondary">로그아웃</button>
    </div>

    <div id="messageBox" class="message-box" style="display:none;"></div>

    <div class="card">
      <table class="notice-table">
        <thead>
          <tr>
            <th style="width:80px;">고정</th>
            <th>제목</th>
            <th style="width:200px;">노출기간</th>
            <th style="width:100px;">작성자</th>
            <th style="width:160px;">작업</th>
          </tr>
        </thead>
        <tbody id="noticeTableBody">
          <tr class="empty-row"><td colspan="5">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 작성/수정 모달 -->
  <div id="noticeFormModal" class="modal" style="display:none;">
    <div class="modal__backdrop" id="noticeFormBackdrop"></div>
    <div class="modal__box">
      <div class="modal__head">
        <h2 id="noticeFormTitle">새 공지 등록</h2>
        <button type="button" class="btn btn--ghost" id="noticeFormCloseBtn">×</button>
      </div>

      <input type="hidden" id="noticeId" />

      <div class="form-row">
        <label for="noticeTitle">제목 *</label>
        <input type="text" id="noticeTitle" maxlength="200" />
      </div>

      <div class="form-row">
        <label for="noticeContent">내용 *</label>
        <textarea id="noticeContent"></textarea>
      </div>

      <div class="form-row-inline">
        <div class="form-row">
          <label for="noticeStartDate">노출 시작일 *</label>
          <input type="date" id="noticeStartDate" />
        </div>
        <div class="form-row">
          <label for="noticeEndDate">노출 종료일</label>
          <input type="date" id="noticeEndDate" />
          <p class="form-help">비워두면 무기한 노출됩니다.</p>
        </div>
      </div>

      <div class="form-row checkbox-row">
        <input type="checkbox" id="noticePinned" />
        <label for="noticePinned" style="margin:0;">상단에 고정</label>
      </div>

      <div class="modal__footer">
        <button type="button" class="btn" id="noticeCancelBtn">취소</button>
        <button type="button" class="btn btn--primary" id="noticeSaveBtn">저장</button>
      </div>
    </div>
  </div>

  <div id="globalLoading" aria-hidden="true">
    <div class="global-loading__dialog">
      <div class="global-loading__spinner"></div>
      <div class="global-loading__text" id="globalLoadingText">불러오는 중...</div>
    </div>
  </div>

  <script src="../../assets/js/core/config.js"></script>
  <script src="../../assets/js/core/api.js"></script>
  <script src="../../assets/js/core/utils.js"></script>
  <script src="../../assets/js/core/auth.js"></script>
  <script src="../../assets/js/admin/notice-admin.js"></script>
</body>
</html>
